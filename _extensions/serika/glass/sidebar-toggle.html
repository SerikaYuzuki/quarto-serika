<script>(function () {
  "use strict";

  document.addEventListener("DOMContentLoaded", function () {
    var body = document.body;
    var reducedMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var sidebar = document.getElementById('quarto-sidebar');
    var marginSidebar = document.getElementById('quarto-margin-sidebar');
    var toc = marginSidebar && marginSidebar.querySelector('#TOC, .sidebar-toc');
    var navbarTools = document.querySelector('.quarto-navbar-tools');
    var brandContainer = document.querySelector('.navbar-brand-container');
    var LEFT_STORAGE_KEY = 'serika-glass-left-visible';
    var TOC_STORAGE_KEY = 'serika-glass-toc-visible';

    function readStoredBoolean(key, fallback) {
      try {
        var value = window.sessionStorage.getItem(key);
        return value === null ? fallback : value !== 'false';
      } catch (_) {
        return fallback;
      }
    }

    function writeStoredBoolean(key, value) {
      try { window.sessionStorage.setItem(key, String(value)); } catch (_) { /* no-op */ }
    }

    // ── navbar の現在地 ----------------------------------------------------
    function normalizedPath(url) {
      var path = url.pathname.replace(/\/index\.html$/i, '/');
      path = path.replace(/\.html$/i, '');
      path = path.replace(/\/{2,}/g, '/').replace(/\/+$/, '');
      return path || '/';
    }

    function updateNavbarActiveLink() {
      var current = new URL(window.location.href);
      var currentPath = normalizedPath(current);
      document.querySelectorAll('.navbar .navbar-nav a.nav-link[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || link.hasAttribute('data-bs-toggle')) return;
        var target;
        try { target = new URL(href, current); } catch (_) { return; }
        if (target.origin !== current.origin) return;
        var isCurrent = normalizedPath(target) === currentPath;
        link.classList.toggle('active', isCurrent);
        if (isCurrent) link.setAttribute('aria-current', 'page');
        else link.removeAttribute('aria-current');
      });
    }
    updateNavbarActiveLink();
    window.addEventListener('pageshow', updateNavbarActiveLink);

    // ── rail state: 左右を独立した属性として同時に適用 ---------------------
    var leftVisible = readStoredBoolean(LEFT_STORAGE_KEY, true);
    var tocVisible = readStoredBoolean(TOC_STORAGE_KEY, true);
    var leftToggleBtn;
    var tocToggleBtn;
    var drawerOpen = false;
    var overlayPanel = null;

    function isMobileNavigation() {
      return window.innerWidth < 992;
    }

    function isOverlayNavigation() {
      return window.innerWidth >= 992 && window.innerWidth < 1280;
    }

    function effectiveLeftVisible() {
      return isOverlayNavigation() ? overlayPanel === 'left' : leftVisible;
    }

    function effectiveTocVisible() {
      return isOverlayNavigation() ? overlayPanel === 'right' : tocVisible;
    }

    function updateLeftToggleState() {
      if (!leftToggleBtn) return;
      var mobile = isMobileNavigation();
      var expanded = mobile ? drawerOpen : effectiveLeftVisible();
      var label = mobile
        ? (expanded ? 'ナビゲーションを閉じる' : 'ナビゲーションを開く')
        : (expanded ? 'サイドバーを非表示' : 'サイドバーを表示');
      leftToggleBtn.setAttribute('aria-controls', mobile ? 'pj-drawer' : 'quarto-sidebar');
      leftToggleBtn.setAttribute('aria-expanded', String(expanded));
      leftToggleBtn.setAttribute('aria-label', label);
      leftToggleBtn.title = label;
    }

    function setInert(element, inert) {
      if (!element) return;
      if ('inert' in element) element.inert = inert;
      if (inert) element.setAttribute('inert', '');
      else element.removeAttribute('inert');
    }

    function applyLayoutState(animate) {
      var leftOpen = effectiveLeftVisible();
      var tocOpen = effectiveTocVisible();
      body.dataset.pjLeft = leftOpen ? 'open' : 'closed';
      body.dataset.pjRight = tocOpen ? 'open' : 'closed';
      if (sidebar) {
        sidebar.setAttribute('aria-hidden', String(!leftOpen));
        setInert(sidebar, !leftOpen);
      }
      if (marginSidebar) {
        marginSidebar.setAttribute('aria-hidden', String(!tocOpen));
        setInert(marginSidebar, !tocOpen);
      }
      updateLeftToggleState();
      if (tocToggleBtn) {
        tocToggleBtn.setAttribute('aria-expanded', String(tocOpen));
        tocToggleBtn.setAttribute('aria-label', tocOpen ? '目次を非表示' : '目次を表示');
        tocToggleBtn.title = tocOpen ? '目次を非表示' : '目次を表示';
      }
      if (animate && !reducedMotion) body.dataset.pjMotionReady = 'true';
    }

    if (navbarTools && toc) {
      tocToggleBtn = document.createElement('button');
      tocToggleBtn.type = 'button';
      tocToggleBtn.className = 'pj-toc-toggle pj-rail-toggle quarto-navigation-tool';
      tocToggleBtn.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse" aria-hidden="true"></i>';
      tocToggleBtn.setAttribute('aria-controls', 'quarto-margin-sidebar');
      navbarTools.insertBefore(tocToggleBtn, navbarTools.firstChild);
      tocToggleBtn.addEventListener('click', function () {
        if (isOverlayNavigation()) {
          overlayPanel = overlayPanel === 'right' ? null : 'right';
          applyLayoutState(true);
          return;
        }
        tocVisible = !tocVisible;
        writeStoredBoolean(TOC_STORAGE_KEY, tocVisible);
        applyLayoutState(true);
      });
    }

    if (brandContainer) {
      leftToggleBtn = document.createElement('button');
      leftToggleBtn.type = 'button';
      leftToggleBtn.innerHTML = [
        '<i class="bi bi-layout-sidebar-inset pj-left-desktop-icon" aria-hidden="true"></i>',
        '<i class="bi bi-list pj-left-mobile-icon" aria-hidden="true"></i>'
      ].join('');
      leftToggleBtn.className = 'navbar-sidebar-toggle pj-rail-toggle quarto-navigation-tool';
      brandContainer.insertBefore(leftToggleBtn, brandContainer.firstChild);
    }

    // First paint uses the final state; transitions become available on the next frame.
    applyLayoutState(false);
    window.requestAnimationFrame(function () { body.dataset.pjMotionReady = 'true'; });

    if (!brandContainer) return;

    // ── mobile navigation sheet -------------------------------------------
    var siteName = (document.querySelector('.navbar-brand') || {}).textContent;
    siteName = siteName ? siteName.trim() : 'Menu';
    var drawer = document.createElement('div');
    drawer.id = 'pj-drawer';
    drawer.setAttribute('aria-hidden', 'true');
    drawer.setAttribute('role', 'dialog');
    drawer.setAttribute('aria-modal', 'true');
    drawer.innerHTML = [
      '<div id="pj-drawer-backdrop"></div>',
      '<nav id="pj-drawer-panel" aria-label="ナビゲーション">',
        '<div id="pj-drawer-header">',
          '<span id="pj-drawer-site-name"></span>',
          '<button id="pj-drawer-close" aria-label="閉じる" type="button"><i class="bi bi-x-lg" aria-hidden="true"></i></button>',
        '</div>',
        '<div id="pj-drawer-tabs" role="tablist" aria-label="ナビゲーションの種類">',
          '<button class="pj-drawer-tab" id="pj-drawer-tab-site" type="button" role="tab" aria-selected="true" aria-controls="pj-drawer-site">サイト</button>',
          '<button class="pj-drawer-tab" id="pj-drawer-tab-toc" type="button" role="tab" aria-selected="false" aria-controls="pj-drawer-toc">このページ</button>',
        '</div>',
        '<div id="pj-drawer-body">',
          '<div id="pj-drawer-site" class="pj-drawer-view" role="tabpanel" aria-labelledby="pj-drawer-tab-site"></div>',
          '<div id="pj-drawer-toc" class="pj-drawer-view" role="tabpanel" aria-labelledby="pj-drawer-tab-toc" hidden></div>',
        '</div>',
      '</nav>'
    ].join('');
    drawer.querySelector('#pj-drawer-site-name').textContent = siteName;
    document.body.appendChild(drawer);

    function cloneInto(source, destination, prefix) {
      if (!source || !destination) return null;
      var clone = source.cloneNode(true);
      clone.querySelectorAll('[id]').forEach(function (el) { el.id = prefix + el.id; });
      clone.querySelectorAll('[data-bs-target]').forEach(function (el) {
        var target = el.getAttribute('data-bs-target');
        if (target && target.charAt(0) === '#') el.setAttribute('data-bs-target', '#' + prefix + target.slice(1));
      });
      clone.querySelectorAll('[aria-controls]').forEach(function (el) {
        var controls = el.getAttribute('aria-controls');
        if (controls) el.setAttribute('aria-controls', controls.split(/\s+/).map(function (id) { return prefix + id; }).join(' '));
      });
      destination.appendChild(clone);
      return clone;
    }

    cloneInto(sidebar && sidebar.querySelector('.sidebar-menu-container'), document.getElementById('pj-drawer-site'), 'pj-');
    var drawerToc = cloneInto(toc, document.getElementById('pj-drawer-toc'), 'pj-toc-');
    var tocTab = document.getElementById('pj-drawer-tab-toc');
    if (!drawerToc) tocTab.hidden = true;

    var backdrop = document.getElementById('pj-drawer-backdrop');
    var closeBtn = document.getElementById('pj-drawer-close');
    var closeTimer;

    function drawerFocusables() {
      return Array.prototype.slice.call(drawer.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])')).filter(function (el) {
        return !el.hidden && el.offsetParent !== null;
      });
    }

    function openDrawer() {
      window.clearTimeout(closeTimer);
      drawerOpen = true;
      drawer.classList.remove('pj-closing');
      drawer.classList.add('pj-open');
      drawer.removeAttribute('aria-hidden');
      body.classList.add('pj-drawer-active');
      updateLeftToggleState();
      window.requestAnimationFrame(function () { closeBtn.focus(); });
    }

    function closeDrawer() {
      if (!drawerOpen) return;
      drawerOpen = false;
      updateLeftToggleState();
      drawer.classList.add('pj-closing');
      window.clearTimeout(closeTimer);
      closeTimer = window.setTimeout(function () {
        drawer.classList.remove('pj-open', 'pj-closing');
        drawer.setAttribute('aria-hidden', 'true');
        body.classList.remove('pj-drawer-active');
        leftToggleBtn.focus();
      }, reducedMotion ? 0 : 280);
    }

    function selectDrawerTab(tab) {
      var siteTab = document.getElementById('pj-drawer-tab-site');
      var sitePanel = document.getElementById('pj-drawer-site');
      var pagePanel = document.getElementById('pj-drawer-toc');
      var pageTab = document.getElementById('pj-drawer-tab-toc');
      var pageSelected = tab === 'toc' && !pageTab.hidden;
      siteTab.setAttribute('aria-selected', String(!pageSelected));
      pageTab.setAttribute('aria-selected', String(pageSelected));
      sitePanel.hidden = pageSelected;
      pagePanel.hidden = !pageSelected;
      (pageSelected ? pageTab : siteTab).focus();
    }

    document.getElementById('pj-drawer-tab-site').addEventListener('click', function () { selectDrawerTab('site'); });
    tocTab.addEventListener('click', function () { selectDrawerTab('toc'); });
    backdrop.addEventListener('click', closeDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    document.getElementById('pj-drawer-body').addEventListener('click', function (event) {
      var link = event.target.closest('a[href]');
      if (link && !link.getAttribute('data-bs-toggle')) closeDrawer();
    });

    document.addEventListener('keydown', function (event) {
      if (!drawerOpen) return;
      if (event.key === 'Escape') { event.preventDefault(); closeDrawer(); return; }
      if (event.key !== 'Tab') return;
      var focusables = drawerFocusables();
      if (!focusables.length) return;
      var first = focusables[0];
      var last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
      else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    });

    leftToggleBtn.addEventListener('click', function () {
      if (isMobileNavigation()) {
        if (drawerOpen) closeDrawer(); else openDrawer();
        return;
      }
      if (isOverlayNavigation()) {
        overlayPanel = overlayPanel === 'left' ? null : 'left';
        applyLayoutState(true);
        return;
      }
      leftVisible = !leftVisible;
      writeStoredBoolean(LEFT_STORAGE_KEY, leftVisible);
      applyLayoutState(true);
    });

    var wasOverlayNavigation = isOverlayNavigation();
    window.addEventListener('resize', function () {
      var overlayNow = isOverlayNavigation();
      if (overlayNow !== wasOverlayNavigation) {
        overlayPanel = null;
        wasOverlayNavigation = overlayNow;
        applyLayoutState(false);
      }
      if (!isMobileNavigation() && drawerOpen) closeDrawer();
      else updateLeftToggleState();
    });

    document.addEventListener('pointerdown', function (event) {
      if (!isOverlayNavigation() || !overlayPanel) return;
      if (event.target.closest('#quarto-sidebar, #quarto-margin-sidebar, .pj-rail-toggle')) return;
      overlayPanel = null;
      applyLayoutState(true);
    });

    document.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape' || !isOverlayNavigation() || !overlayPanel) return;
      overlayPanel = null;
      applyLayoutState(true);
    });

    // ── navbar は下方向で退避、上方向で復帰 -------------------------------
    var navbar = document.querySelector('.navbar');
    if (navbar) {
      var lastScrollY = window.scrollY;
      var ticking = false;
      function handleNavbarScroll() {
        var current = window.scrollY;
        if (current < 80 || current <= lastScrollY) navbar.classList.remove('pj-navbar-hidden');
        else navbar.classList.add('pj-navbar-hidden');
        lastScrollY = current;
        ticking = false;
      }
      window.addEventListener('scroll', function () {
        if (!ticking) { window.requestAnimationFrame(handleNavbarScroll); ticking = true; }
      }, { passive: true });
    }

    // ── P2: 小さな操作フィードバック --------------------------------------
    document.addEventListener('click', function (event) {
      var calloutHeader = event.target.closest('.callout-header[data-bs-toggle="collapse"]');
      if (calloutHeader && !reducedMotion) {
        var callout = calloutHeader.closest('.callout');
        if (callout) {
          callout.classList.remove('pj-callout-pulse');
          void callout.offsetWidth;
          callout.classList.add('pj-callout-pulse');
          window.setTimeout(function () { callout.classList.remove('pj-callout-pulse'); }, 420);
        }
      }

      var copyButton = event.target.closest('.code-copy-button');
      if (copyButton && !reducedMotion) {
        copyButton.classList.add('pj-copy-success');
        copyButton.setAttribute('data-pj-copy-state', 'copied');
        window.setTimeout(function () {
          copyButton.classList.remove('pj-copy-success');
          copyButton.removeAttribute('data-pj-copy-state');
        }, 1000);
      }

      var anchor = event.target.closest('a[href^="#"]');
      if (anchor) {
        var targetId = anchor.getAttribute('href').slice(1);
        var decodedTargetId = targetId;
        try { decodedTargetId = decodeURIComponent(targetId); } catch (_) { /* keep raw hash */ }
        var target = targetId && document.getElementById(decodedTargetId);
        if (target && !reducedMotion) {
          target.classList.remove('pj-anchor-target');
          void target.offsetWidth;
          target.classList.add('pj-anchor-target');
          window.setTimeout(function () { target.classList.remove('pj-anchor-target'); }, 900);
        }
      }

      if (event.target.closest('.quarto-color-scheme-toggle') && !reducedMotion) {
        body.classList.remove('pj-theme-transition');
        void body.offsetWidth;
        body.classList.add('pj-theme-transition');
        window.setTimeout(function () { body.classList.remove('pj-theme-transition'); }, 360);
      }
    }, true);

    // TOC の現在地に追従する細いマーカー（既存の active 表現は維持）。
    if (toc && window.IntersectionObserver) {
      function tocTargetId(link) {
        var href = link.getAttribute('href') || '';
        var hash = '';
        try {
          var targetUrl = new URL(href, window.location.href);
          var currentUrl = new URL(window.location.href);
          if (targetUrl.origin !== currentUrl.origin ||
              normalizedPath(targetUrl) !== normalizedPath(currentUrl)) return '';
          hash = targetUrl.hash;
        } catch (_) { return ''; }
        var id = hash.slice(1);
        try { id = decodeURIComponent(id); } catch (_) { /* keep raw hash */ }
        return id;
      }

      var tocLinks = Array.prototype.slice.call(toc.querySelectorAll('a[href]')).filter(function (link) {
        return document.getElementById(tocTargetId(link));
      });
      if (tocLinks.length) {
        toc.style.position = 'relative';
        var marker = document.createElement('span');
        marker.className = 'pj-toc-marker';
        marker.setAttribute('aria-hidden', 'true');
        toc.appendChild(marker);
        var visibleHeadings = new Map();
        function moveMarker(link) {
          var tocRect = toc.getBoundingClientRect();
          var linkRect = link.getBoundingClientRect();
          marker.style.left = Math.max(0, linkRect.left - tocRect.left) + 'px';
          marker.style.height = linkRect.height + 'px';
          marker.style.transform = 'translateY(' + (linkRect.top - tocRect.top + toc.scrollTop) + 'px)';
          marker.style.opacity = '1';
        }
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            var link = tocLinks.find(function (item) { return tocTargetId(item) === entry.target.id; });
            if (link) visibleHeadings.set(entry.target, entry.isIntersecting ? entry.boundingClientRect.top : Infinity);
          });
          var current = Array.from(visibleHeadings.entries()).sort(function (a, b) { return a[1] - b[1]; })[0];
          if (current) moveMarker(tocLinks.find(function (link) { return tocTargetId(link) === current[0].id; }));
        }, { rootMargin: '-18% 0px -68% 0px', threshold: [0, 1] });
        tocLinks.forEach(function (link) { observer.observe(document.getElementById(tocTargetId(link))); });
        window.addEventListener('resize', function () {
          var active = toc.querySelector('a.active') || tocLinks[0];
          if (active) moveMarker(active);
        });
      }
    }
  });
})();</script>

<script>(function () {
  "use strict";

  // Load the two site-wide TeX extensions before Quarto starts MathJax.
  // This keeps individual .qmd files free from repeated \require commands.
  var mathJaxConfig = window.MathJax = window.MathJax || {};
  var mathJaxLoader = mathJaxConfig.loader = mathJaxConfig.loader || {};
  var mathJaxLoad = mathJaxLoader.load = mathJaxLoader.load || [];
  ['[tex]/physics', '[tex]/mhchem'].forEach(function (component) {
    if (mathJaxLoad.indexOf(component) < 0) mathJaxLoad.push(component);
  });
  var mathJaxTex = mathJaxConfig.tex = mathJaxConfig.tex || {};
  var mathJaxPackages = mathJaxTex.packages = mathJaxTex.packages || {};
  if (Array.isArray(mathJaxPackages)) {
    ['physics', 'mhchem'].forEach(function (name) {
      if (mathJaxPackages.indexOf(name) < 0) mathJaxPackages.push(name);
    });
  } else {
    var mathJaxAdditions = mathJaxPackages['[+]'] = mathJaxPackages['[+]'] || [];
    ['physics', 'mhchem'].forEach(function (name) {
      if (mathJaxAdditions.indexOf(name) < 0) mathJaxAdditions.push(name);
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    var body = document.body;
    var reducedMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var mobilePerformanceMode = window.matchMedia &&
      window.matchMedia('(max-width: 991.98px)').matches;
    var sidebar = document.getElementById('quarto-sidebar');
    var marginSidebar = document.getElementById('quarto-margin-sidebar');
    var toc = marginSidebar && marginSidebar.querySelector('#TOC, .sidebar-toc');
    var tocScrollRegion = null;
    if (toc) {
      var tocList = toc.querySelector(':scope > ul');
      if (tocList) {
        tocScrollRegion = document.createElement('div');
        tocScrollRegion.className = 'pj-toc-scroll-region';
        toc.insertBefore(tocScrollRegion, tocList);
        tocScrollRegion.appendChild(tocList);
      }
    }
    var navbarTools = document.querySelector('.quarto-navbar-tools');
    var brandContainer = document.querySelector('.navbar-brand-container');
    var LEFT_STORAGE_KEY = 'serika-glass-left-visible';
    var TOC_STORAGE_KEY = 'serika-glass-toc-visible';

    function readStoredBoolean(key, fallback) {
      try {
        var value = window.sessionStorage.getItem(key);
        return value === null ? fallback : value !== 'false';
      } catch (_) {
        return fallback;
      }
    }

    function writeStoredBoolean(key, value) {
      try { window.sessionStorage.setItem(key, String(value)); } catch (_) { /* no-op */ }
    }

    // ── navbar の現在地 ----------------------------------------------------
    function normalizedPath(url) {
      var path = url.pathname.replace(/\/index\.html$/i, '/');
      path = path.replace(/\.html$/i, '');
      path = path.replace(/\/{2,}/g, '/').replace(/\/+$/, '');
      return path || '/';
    }

    function updateNavbarActiveLink() {
      var current = new URL(window.location.href);
      var currentPath = normalizedPath(current);
      document.querySelectorAll('.navbar .navbar-nav a.nav-link[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || link.hasAttribute('data-bs-toggle')) return;
        var target;
        try { target = new URL(href, current); } catch (_) { return; }
        if (target.origin !== current.origin) return;
        var isCurrent = normalizedPath(target) === currentPath;
        link.classList.toggle('active', isCurrent);
        if (isCurrent) link.setAttribute('aria-current', 'page');
        else link.removeAttribute('aria-current');
      });
    }
    updateNavbarActiveLink();
    window.addEventListener('pageshow', updateNavbarActiveLink);

    // ── rail state: 左右を独立した属性として同時に適用 ---------------------
    var leftVisible = readStoredBoolean(LEFT_STORAGE_KEY, true);
    var tocVisible = readStoredBoolean(TOC_STORAGE_KEY, true);
    var leftToggleBtn;
    var tocToggleBtn;
    var drawerOpen = false;
    var overlayPanel = null;

    function isMobileNavigation() {
      return window.innerWidth < 992;
    }

    function isOverlayNavigation() {
      return window.innerWidth >= 992 && window.innerWidth < 1280;
    }

    function effectiveLeftVisible() {
      return isOverlayNavigation() ? overlayPanel === 'left' : leftVisible;
    }

    function effectiveTocVisible() {
      return isOverlayNavigation() ? overlayPanel === 'right' : tocVisible;
    }

    function updateLeftToggleState() {
      if (!leftToggleBtn) return;
      var mobile = isMobileNavigation();
      var expanded = mobile ? drawerOpen : effectiveLeftVisible();
      var label = mobile
        ? (expanded ? 'ナビゲーションを閉じる' : 'ナビゲーションを開く')
        : (expanded ? 'サイドバーを非表示' : 'サイドバーを表示');
      leftToggleBtn.setAttribute('aria-controls', mobile ? 'pj-drawer' : 'quarto-sidebar');
      leftToggleBtn.setAttribute('aria-expanded', String(expanded));
      leftToggleBtn.setAttribute('aria-label', label);
      leftToggleBtn.title = label;
    }

    function setInert(element, inert) {
      if (!element) return;
      if ('inert' in element) element.inert = inert;
      if (inert) element.setAttribute('inert', '');
      else element.removeAttribute('inert');
    }

    function applyLayoutState(animate) {
      var leftOpen = effectiveLeftVisible();
      var tocOpen = effectiveTocVisible();
      body.dataset.pjLeft = leftOpen ? 'open' : 'closed';
      body.dataset.pjRight = tocOpen ? 'open' : 'closed';
      if (sidebar) {
        sidebar.setAttribute('aria-hidden', String(!leftOpen));
        setInert(sidebar, !leftOpen);
      }
      if (marginSidebar) {
        marginSidebar.setAttribute('aria-hidden', String(!tocOpen));
        setInert(marginSidebar, !tocOpen);
      }
      updateLeftToggleState();
      if (tocToggleBtn) {
        tocToggleBtn.setAttribute('aria-expanded', String(tocOpen));
        tocToggleBtn.setAttribute('aria-label', tocOpen ? '目次を非表示' : '目次を表示');
        tocToggleBtn.title = tocOpen ? '目次を非表示' : '目次を表示';
      }
      if (animate && !reducedMotion) body.dataset.pjMotionReady = 'true';
    }

    if (navbarTools && toc) {
      tocToggleBtn = document.createElement('button');
      tocToggleBtn.type = 'button';
      tocToggleBtn.className = 'pj-toc-toggle pj-rail-toggle quarto-navigation-tool';
      tocToggleBtn.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse" aria-hidden="true"></i>';
      tocToggleBtn.setAttribute('aria-controls', 'quarto-margin-sidebar');
      navbarTools.insertBefore(tocToggleBtn, navbarTools.firstChild);
      tocToggleBtn.addEventListener('click', function () {
        if (isOverlayNavigation()) {
          overlayPanel = overlayPanel === 'right' ? null : 'right';
          applyLayoutState(true);
          return;
        }
        tocVisible = !tocVisible;
        writeStoredBoolean(TOC_STORAGE_KEY, tocVisible);
        applyLayoutState(true);
      });
    }

    if (brandContainer) {
      leftToggleBtn = document.createElement('button');
      leftToggleBtn.type = 'button';
      leftToggleBtn.innerHTML = [
        '<i class="bi bi-layout-sidebar-inset pj-left-desktop-icon" aria-hidden="true"></i>',
        '<i class="bi bi-list pj-left-mobile-icon" aria-hidden="true"></i>'
      ].join('');
      leftToggleBtn.className = 'navbar-sidebar-toggle pj-rail-toggle quarto-navigation-tool';
      brandContainer.insertBefore(leftToggleBtn, brandContainer.firstChild);
    }

    // First paint uses the final state; transitions become available on the next frame.
    applyLayoutState(false);
    window.requestAnimationFrame(function () { body.dataset.pjMotionReady = 'true'; });

    if (!brandContainer) return;

    // ── mobile navigation sheet -------------------------------------------
    var siteName = (document.querySelector('.navbar-brand') || {}).textContent;
    siteName = siteName ? siteName.trim() : 'Menu';
    var drawer = document.createElement('div');
    drawer.id = 'pj-drawer';
    drawer.setAttribute('aria-hidden', 'true');
    drawer.setAttribute('role', 'dialog');
    drawer.setAttribute('aria-modal', 'true');
    drawer.innerHTML = [
      '<div id="pj-drawer-backdrop"></div>',
      '<nav id="pj-drawer-panel" aria-label="ナビゲーション">',
        '<div id="pj-drawer-header">',
          '<span id="pj-drawer-site-name"></span>',
          '<button id="pj-drawer-close" aria-label="閉じる" type="button"><i class="bi bi-x-lg" aria-hidden="true"></i></button>',
        '</div>',
        '<div id="pj-drawer-tabs" role="tablist" aria-label="ナビゲーションの種類">',
          '<button class="pj-drawer-tab" id="pj-drawer-tab-site" type="button" role="tab" aria-selected="true" aria-controls="pj-drawer-site">サイト</button>',
          '<button class="pj-drawer-tab" id="pj-drawer-tab-toc" type="button" role="tab" aria-selected="false" aria-controls="pj-drawer-toc">このページ</button>',
        '</div>',
        '<div id="pj-drawer-body">',
          '<div id="pj-drawer-site" class="pj-drawer-view" role="tabpanel" aria-labelledby="pj-drawer-tab-site"></div>',
          '<div id="pj-drawer-toc" class="pj-drawer-view" role="tabpanel" aria-labelledby="pj-drawer-tab-toc" hidden></div>',
        '</div>',
      '</nav>'
    ].join('');
    drawer.querySelector('#pj-drawer-site-name').textContent = siteName;
    document.body.appendChild(drawer);

    function cloneInto(source, destination, prefix) {
      if (!source || !destination) return null;
      var clone = source.cloneNode(true);
      clone.querySelectorAll('[id]').forEach(function (el) { el.id = prefix + el.id; });
      clone.querySelectorAll('[data-bs-target]').forEach(function (el) {
        var target = el.getAttribute('data-bs-target');
        if (target && target.charAt(0) === '#') el.setAttribute('data-bs-target', '#' + prefix + target.slice(1));
      });
      clone.querySelectorAll('[aria-controls]').forEach(function (el) {
        var controls = el.getAttribute('aria-controls');
        if (controls) el.setAttribute('aria-controls', controls.split(/\s+/).map(function (id) { return prefix + id; }).join(' '));
      });
      destination.appendChild(clone);
      return clone;
    }

    cloneInto(sidebar && sidebar.querySelector('.sidebar-menu-container'), document.getElementById('pj-drawer-site'), 'pj-');
    var drawerToc = cloneInto(toc, document.getElementById('pj-drawer-toc'), 'pj-toc-');
    var tocTab = document.getElementById('pj-drawer-tab-toc');
    if (!drawerToc) tocTab.hidden = true;

    var backdrop = document.getElementById('pj-drawer-backdrop');
    var closeBtn = document.getElementById('pj-drawer-close');
    var closeTimer;

    function drawerFocusables() {
      return Array.prototype.slice.call(drawer.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])')).filter(function (el) {
        return !el.hidden && el.offsetParent !== null;
      });
    }

    function openDrawer() {
      window.clearTimeout(closeTimer);
      drawerOpen = true;
      drawer.classList.remove('pj-closing');
      drawer.classList.add('pj-open');
      drawer.removeAttribute('aria-hidden');
      body.classList.add('pj-drawer-active');
      updateLeftToggleState();
      window.requestAnimationFrame(function () { closeBtn.focus(); });
    }

    function closeDrawer() {
      if (!drawerOpen) return;
      drawerOpen = false;
      updateLeftToggleState();
      drawer.classList.add('pj-closing');
      window.clearTimeout(closeTimer);
      closeTimer = window.setTimeout(function () {
        drawer.classList.remove('pj-open', 'pj-closing');
        drawer.setAttribute('aria-hidden', 'true');
        body.classList.remove('pj-drawer-active');
        leftToggleBtn.focus();
      }, reducedMotion ? 0 : 280);
    }

    function selectDrawerTab(tab) {
      var siteTab = document.getElementById('pj-drawer-tab-site');
      var sitePanel = document.getElementById('pj-drawer-site');
      var pagePanel = document.getElementById('pj-drawer-toc');
      var pageTab = document.getElementById('pj-drawer-tab-toc');
      var pageSelected = tab === 'toc' && !pageTab.hidden;
      siteTab.setAttribute('aria-selected', String(!pageSelected));
      pageTab.setAttribute('aria-selected', String(pageSelected));
      sitePanel.hidden = pageSelected;
      pagePanel.hidden = !pageSelected;
      (pageSelected ? pageTab : siteTab).focus();
    }

    document.getElementById('pj-drawer-tab-site').addEventListener('click', function () { selectDrawerTab('site'); });
    tocTab.addEventListener('click', function () { selectDrawerTab('toc'); });
    backdrop.addEventListener('click', closeDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    document.getElementById('pj-drawer-body').addEventListener('click', function (event) {
      var link = event.target.closest('a[href]');
      if (link && !link.getAttribute('data-bs-toggle')) closeDrawer();
    });

    document.addEventListener('keydown', function (event) {
      if (!drawerOpen) return;
      if (event.key === 'Escape') { event.preventDefault(); closeDrawer(); return; }
      if (event.key !== 'Tab') return;
      var focusables = drawerFocusables();
      if (!focusables.length) return;
      var first = focusables[0];
      var last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
      else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    });

    leftToggleBtn.addEventListener('click', function () {
      if (isMobileNavigation()) {
        if (drawerOpen) closeDrawer(); else openDrawer();
        return;
      }
      if (isOverlayNavigation()) {
        overlayPanel = overlayPanel === 'left' ? null : 'left';
        applyLayoutState(true);
        return;
      }
      leftVisible = !leftVisible;
      writeStoredBoolean(LEFT_STORAGE_KEY, leftVisible);
      applyLayoutState(true);
    });

    var wasOverlayNavigation = isOverlayNavigation();
    window.addEventListener('resize', function () {
      var overlayNow = isOverlayNavigation();
      if (overlayNow !== wasOverlayNavigation) {
        overlayPanel = null;
        wasOverlayNavigation = overlayNow;
        applyLayoutState(false);
      }
      if (!isMobileNavigation() && drawerOpen) closeDrawer();
      else updateLeftToggleState();
    });

    document.addEventListener('pointerdown', function (event) {
      if (!isOverlayNavigation() || !overlayPanel) return;
      if (event.target.closest('#quarto-sidebar, #quarto-margin-sidebar, .pj-rail-toggle')) return;
      overlayPanel = null;
      applyLayoutState(true);
    });

    document.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape' || !isOverlayNavigation() || !overlayPanel) return;
      overlayPanel = null;
      applyLayoutState(true);
    });

    // ── navbar は下方向で退避、上方向で復帰 -------------------------------
    var navbar = document.querySelector('.navbar');
    if (navbar && !mobilePerformanceMode) {
      var lastScrollY = window.scrollY;
      var ticking = false;
      function handleNavbarScroll() {
        var current = window.scrollY;
        if (current < 80 || current <= lastScrollY) navbar.classList.remove('pj-navbar-hidden');
        else navbar.classList.add('pj-navbar-hidden');
        lastScrollY = current;
        ticking = false;
      }
      window.addEventListener('scroll', function () {
        if (!ticking) { window.requestAnimationFrame(handleNavbarScroll); ticking = true; }
      }, { passive: true });
    }

    // ── P2: 小さな操作フィードバック --------------------------------------
    document.addEventListener('click', function (event) {
      var sidebarSectionToggle = event.target.closest('#quarto-sidebar .sidebar-item-toggle, #pj-drawer-body .sidebar-item-toggle');
      if (sidebarSectionToggle && !reducedMotion) {
        var chevron = sidebarSectionToggle.querySelector('.bi-chevron-right');
        if (chevron) {
          chevron.classList.remove('pj-chevron-highlight');
          void chevron.offsetWidth;
          chevron.classList.add('pj-chevron-highlight');
          window.setTimeout(function () { chevron.classList.remove('pj-chevron-highlight'); }, 480);
        }
      }

      var calloutHeader = event.target.closest('.callout-header[data-bs-toggle="collapse"]');
      if (calloutHeader && !reducedMotion) {
        var callout = calloutHeader.closest('.callout');
        if (callout) {
          callout.classList.remove('pj-callout-pulse');
          void callout.offsetWidth;
          callout.classList.add('pj-callout-pulse');
          window.setTimeout(function () { callout.classList.remove('pj-callout-pulse'); }, 420);
        }
      }

      var copyButton = event.target.closest('.code-copy-button');
      if (copyButton && !reducedMotion) {
        copyButton.classList.add('pj-copy-success');
        copyButton.setAttribute('data-pj-copy-state', 'copied');
        window.setTimeout(function () {
          copyButton.classList.remove('pj-copy-success');
          copyButton.removeAttribute('data-pj-copy-state');
        }, 1000);
      }

      var anchor = event.target.closest('a[href^="#"]');
      if (anchor) {
        var targetId = anchor.getAttribute('href').slice(1);
        var decodedTargetId = targetId;
        try { decodedTargetId = decodeURIComponent(targetId); } catch (_) { /* keep raw hash */ }
        var target = targetId && document.getElementById(decodedTargetId);
        if (target && !reducedMotion) {
          target.classList.remove('pj-anchor-target');
          void target.offsetWidth;
          target.classList.add('pj-anchor-target');
          window.setTimeout(function () { target.classList.remove('pj-anchor-target'); }, 900);
        }
      }

      if (event.target.closest('.quarto-color-scheme-toggle') && !reducedMotion) {
        body.classList.remove('pj-theme-transition');
        void body.offsetWidth;
        body.classList.add('pj-theme-transition');
        window.setTimeout(function () { body.classList.remove('pj-theme-transition'); }, 360);
      }
    }, true);

    // Quarto ScrollSpy remains the sole owner of `.active`. Quarto can retain
    // an ancestor/first entry while activating the current descendant, so the
    // rail projects the last active link in document order to one visual state.
    // The mobile drawer clone is outside `toc` and never participates.
    if (toc && tocScrollRegion && !mobilePerformanceMode) {
      var visibleTocCurrent = null;
      var tocProjectionFrame = 0;

      function revealVisibleTocCurrent(link) {
        var regionRect = tocScrollRegion.getBoundingClientRect();
        var linkRect = link.getBoundingClientRect();
        var inset = 8;
        if (linkRect.top < regionRect.top + inset) {
          tocScrollRegion.scrollTop += linkRect.top - regionRect.top - inset;
        } else if (linkRect.bottom > regionRect.bottom - inset) {
          tocScrollRegion.scrollTop += linkRect.bottom - regionRect.bottom + inset;
        }
      }

      function projectVisibleTocCurrent() {
        tocProjectionFrame = 0;
        var nativeActiveLinks = Array.prototype.slice.call(
          toc.querySelectorAll('a.nav-link.active')
        ).filter(function (link) {
          return tocScrollRegion.contains(link);
        });
        var next = nativeActiveLinks.length
          ? nativeActiveLinks[nativeActiveLinks.length - 1]
          : visibleTocCurrent;
        if (!next) return;

        toc.querySelectorAll('a.pj-toc-visible-current').forEach(function (link) {
          if (link !== next) link.classList.remove('pj-toc-visible-current');
        });
        if (!next.classList.contains('pj-toc-visible-current')) {
          next.classList.add('pj-toc-visible-current');
        }
        visibleTocCurrent = next;
        window.requestAnimationFrame(function () { revealVisibleTocCurrent(next); });
      }

      function requestTocProjection() {
        if (!tocProjectionFrame) {
          tocProjectionFrame = window.requestAnimationFrame(projectVisibleTocCurrent);
        }
      }

      projectVisibleTocCurrent();
      var tocActiveObserver = new MutationObserver(requestTocProjection);
      tocActiveObserver.observe(tocScrollRegion, {
        subtree: true,
        attributes: true,
        attributeFilter: ['class']
      });
      window.addEventListener('resize', requestTocProjection, { passive: true });
    }

    // ── Prismatic Mathematical Observatory: Phase 1 reading layer ---------
    var article = document.getElementById('quarto-document-content');
    if (article) {
      var titleBlock = article.querySelector('#title-block-header');
      var title = titleBlock && titleBlock.querySelector('.title');
      var chapterSections = Array.prototype.slice.call(article.querySelectorAll(':scope > section.level2'));
      var allHeadings = Array.prototype.slice.call(article.querySelectorAll('section > h2, section > h3'));
      var budouHeadings = Array.prototype.slice.call(article.querySelectorAll('section > h2, section > h3, section > h4, section > h5, section > h6'));

      function applyBudouToHeading(heading) {
        if (!heading || heading.querySelector(':scope > budoux-ja')) return;
        if (!/[\u3040-\u30ff\u3400-\u9fff]/.test(heading.textContent || '')) return;
        var excluded = '.anchorjs-link, .header-section-number, .pj-chapter-marker';
        var contentNodes = Array.prototype.slice.call(heading.childNodes).filter(function (node) {
          return node.nodeType === Node.TEXT_NODE ||
            (node.nodeType === Node.ELEMENT_NODE && !node.matches(excluded));
        });
        if (!contentNodes.length) return;
        var wrapper = document.createElement('budoux-ja');
        var insertionPoint = document.createComment('budoux');
        heading.insertBefore(insertionPoint, contentNodes[0]);
        contentNodes.forEach(function (node) { wrapper.appendChild(node); });
        heading.replaceChild(wrapper, insertionPoint);
      }

      applyBudouToHeading(title);
      budouHeadings.forEach(applyBudouToHeading);

      // Progress UI remains useful without animation and is announced only
      // when explicitly focused, avoiding noisy live-region scroll updates.
      var progress = document.createElement('div');
      progress.id = 'pj-reading-progress';
      progress.setAttribute('role', 'progressbar');
      progress.setAttribute('aria-label', '記事の読書進捗');
      progress.setAttribute('aria-valuemin', '0');
      progress.setAttribute('aria-valuemax', '100');
      progress.setAttribute('aria-valuenow', '0');
      progress.innerHTML = '<span class="pj-reading-progress-bar" aria-hidden="true"></span>';
      document.body.insertBefore(progress, document.body.firstChild);

      var status = document.createElement('aside');
      status.id = 'pj-reading-status';
      status.setAttribute('aria-label', '現在の読書位置');
      status.setAttribute('tabindex', '0');
      status.innerHTML = [
        '<span class="pj-reading-orbit" aria-hidden="true">',
          '<svg viewBox="0 0 36 36" focusable="false">',
            '<circle class="pj-reading-orbit-track" cx="18" cy="18" r="15"></circle>',
            '<circle class="pj-reading-orbit-progress" cx="18" cy="18" r="15" stroke-dasharray="94.2478 94.2478" stroke-dashoffset="94.2478"></circle>',
          '</svg>',
        '</span>',
        '<span class="pj-reading-copy">',
          '<span class="pj-reading-chapter">Introduction</span>',
          '<span class="pj-reading-heading">記事の先頭</span>',
        '</span>',
        '<span class="pj-reading-percent">0%</span>'
      ].join('');
      document.body.appendChild(status);

      if (titleBlock && title) {
        titleBlock.classList.add('pj-observatory-hero');

        if (!reducedMotion && window.matchMedia && window.matchMedia('(pointer: fine)').matches) {
          ['cyan', 'magenta'].forEach(function (tone) {
            var layer = document.createElement('span');
            layer.className = 'pj-title-chroma pj-title-chroma-' + tone;
            layer.setAttribute('aria-hidden', 'true');
            Array.prototype.slice.call(title.childNodes).forEach(function (node) {
              if (node.nodeType === Node.ELEMENT_NODE && node.matches('.anchorjs-link, .pj-title-chroma')) return;
              layer.appendChild(node.cloneNode(true));
            });
            title.appendChild(layer);
          });

          var chromaFrame = 0;
          var pointerX = -10000;
          var pointerY = -10000;
          function renderTitleChroma() {
            var rect = title.getBoundingClientRect();
            var nearestX = Math.max(rect.left, Math.min(pointerX, rect.right));
            var nearestY = Math.max(rect.top, Math.min(pointerY, rect.bottom));
            var distance = Math.hypot(pointerX - nearestX, pointerY - nearestY);
            var proximity = Math.max(0, 1 - distance / 150);
            var horizontal = pointerX < rect.left + rect.width / 2 ? -1 : 1;
            var vertical = pointerY < rect.top + rect.height / 2 ? -1 : 1;
            var shift = 0.55 + proximity * 1.25;
            title.style.setProperty('--pj-chroma-opacity', String(proximity * 0.3));
            title.style.setProperty('--pj-chroma-cyan-x', (-horizontal * shift) + 'px');
            title.style.setProperty('--pj-chroma-cyan-y', (-vertical * shift * 0.28) + 'px');
            title.style.setProperty('--pj-chroma-magenta-x', (horizontal * shift) + 'px');
            title.style.setProperty('--pj-chroma-magenta-y', (vertical * shift * 0.28) + 'px');
            chromaFrame = 0;
          }
          document.addEventListener('pointermove', function (event) {
            pointerX = event.clientX;
            pointerY = event.clientY;
            if (!chromaFrame) chromaFrame = window.requestAnimationFrame(renderTitleChroma);
          }, { passive: true });
          window.addEventListener('blur', function () {
            title.style.setProperty('--pj-chroma-opacity', '0');
          });
        }

        var yearMatch = (titleBlock.textContent || '').match(/(?:19|20)\d{2}/);
        var overline = document.createElement('p');
        overline.className = 'pj-hero-overline';
        overline.textContent = 'PRISMATIC MATHEMATICAL OBSERVATORY' + (yearMatch ? ' · ' + yearMatch[0] : '');
        title.parentNode.insertBefore(overline, title);

        var readingText = Array.prototype.slice.call(article.querySelectorAll('section p, section li'))
          .map(function (node) { return node.textContent || ''; }).join(' ');
        var japaneseChars = (readingText.match(/[\u3040-\u30ff\u3400-\u9fff]/g) || []).length;
        var latinWords = (readingText.match(/[A-Za-z0-9]+/g) || []).length;
        var readingMinutes = Math.max(1, Math.ceil(japaneseChars / 500 + latinWords / 220));

        var dashboard = document.createElement('div');
        dashboard.className = 'pj-hero-dashboard';
        dashboard.innerHTML = [
          '<div class="pj-hero-stat"><span>READING TIME</span><strong>' + readingMinutes + ' min</strong></div>',
          '<div class="pj-hero-stat"><span>CHAPTERS</span><strong>' + chapterSections.length + '</strong></div>'
        ].join('');
        titleBlock.appendChild(dashboard);

      }

      chapterSections.forEach(function (section, index) {
        var heading = section.querySelector(':scope > h2');
        if (!heading) return;
        section.classList.add('pj-chapter');
        section.style.setProperty('--pj-chapter-index', String(index));
        var marker = document.createElement('span');
        marker.className = 'pj-chapter-marker';
        marker.setAttribute('aria-hidden', 'true');
        marker.innerHTML = '<span class="pj-chapter-number">CHAPTER ' + String(index + 1).padStart(2, '0') + '</span><span class="pj-chapter-symbol">' + ['∿', '∑', 'ƒ', '∫'][index % 4] + '</span>';
        heading.insertBefore(marker, heading.firstChild);
      });

      article.querySelectorAll('.callout').forEach(function (callout) {
        var calloutTitle = callout.querySelector('.callout-title-container');
        var label = calloutTitle ? calloutTitle.textContent.trim() : '';
        if (/理論|Theory/i.test(label)) callout.classList.add('pj-theory-card');
        if (/解答|Answer|Solution/i.test(label)) {
          callout.classList.add('pj-solution-card');
          var header = callout.querySelector('.callout-header[data-bs-toggle="collapse"]');
          if (header) header.setAttribute('aria-label', header.getAttribute('aria-expanded') === 'true' ? '解答を閉じる' : '解答を見る');
        }
      });

      document.addEventListener('shown.bs.collapse', function (event) {
        var header = event.target.closest('.callout') && event.target.closest('.callout').querySelector('.callout-header');
        if (header && header.closest('.pj-solution-card')) header.setAttribute('aria-label', '解答を閉じる');
      });
      document.addEventListener('hidden.bs.collapse', function (event) {
        var header = event.target.closest('.callout') && event.target.closest('.callout').querySelector('.callout-header');
        if (header && header.closest('.pj-solution-card')) header.setAttribute('aria-label', '解答を見る');
      });

      if (window.IntersectionObserver && !reducedMotion && !mobilePerformanceMode) {
        var chapterRevealObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              var chapter = entry.target.closest('.pj-chapter');
              if (chapter) chapter.classList.add('pj-chapter-visible');
              chapterRevealObserver.unobserve(entry.target);
            }
          });
        }, { rootMargin: '0px 0px -14% 0px', threshold: 0.12 });
        chapterSections.forEach(function (section) {
          var heading = section.querySelector(':scope > h2');
          if (heading) chapterRevealObserver.observe(heading);
        });
      } else {
        chapterSections.forEach(function (section) { section.classList.add('pj-chapter-visible'); });
      }

      var statusChapter = status.querySelector('.pj-reading-chapter');
      var statusHeading = status.querySelector('.pj-reading-heading');
      var statusPercent = status.querySelector('.pj-reading-percent');
      var statusOrbitProgress = status.querySelector('.pj-reading-orbit-progress');
      var progressBar = progress.querySelector('.pj-reading-progress-bar');
      var progressTicking = false;
      var completed = false;
      var headingOffsets = [];
      var currentHeadingNode = null;
      var currentPercentage = -1;
      var scrollRange = 1;
      var geometryTimer = 0;

      function refreshHeadingOffsets() {
        headingOffsets = allHeadings.map(function (heading) {
          var label = heading.cloneNode(true);
          label.querySelectorAll('.pj-chapter-marker, .anchorjs-link').forEach(function (node) { node.remove(); });
          return {
            heading: heading,
            top: heading.getBoundingClientRect().top + window.scrollY,
            label: label.textContent.trim()
          };
        });
        scrollRange = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      }

      function headingAtReadingLine() {
        var readingLine = window.scrollY + Math.min(window.innerHeight * 0.32, 280);
        var low = 0;
        var high = headingOffsets.length - 1;
        var current = -1;
        while (low <= high) {
          var middle = (low + high) >> 1;
          if (headingOffsets[middle].top <= readingLine) {
            current = middle;
            low = middle + 1;
          } else {
            high = middle - 1;
          }
        }
        return current >= 0 ? headingOffsets[current] : null;
      }

      function updateReadingState() {
        if (activePreviewLink) hideLinkPreview(activePreviewLink);
        var percentage = Math.max(0, Math.min(100, Math.round(window.scrollY / scrollRange * 100)));
        var currentHeadingItem = headingAtReadingLine();
        var currentHeading = currentHeadingItem && currentHeadingItem.heading;
        var currentChapter = currentHeading && currentHeading.closest('.pj-chapter');
        var chapterIndex = currentChapter ? chapterSections.indexOf(currentChapter) + 1 : 0;
        var headingText = currentHeadingItem ? currentHeadingItem.label : '記事の先頭';

        if (percentage !== currentPercentage) {
          currentPercentage = percentage;
          var circumference = 94.2478;
          document.documentElement.style.setProperty('--pj-reading-progress', percentage + '%');
          progressBar.style.transform = 'scaleX(' + (percentage / 100) + ')';
          progress.setAttribute('aria-valuenow', String(percentage));
          statusOrbitProgress.style.strokeDashoffset = String(circumference * (1 - percentage / 100));
          statusPercent.textContent = percentage + '%';
          progress.setAttribute('aria-valuetext', percentage + '%、' + headingText);
        }

        if (currentHeading !== currentHeadingNode) {
          currentHeadingNode = currentHeading;
          var chapterHeading = currentChapter && currentChapter.querySelector(':scope > h2');
          var chapterText = chapterHeading ? chapterHeading.cloneNode(true) : null;
          if (chapterText) chapterText.querySelectorAll('.pj-chapter-marker, .anchorjs-link').forEach(function (node) { node.remove(); });
          statusHeading.textContent = headingText;
          statusChapter.textContent = chapterIndex ? 'Chapter ' + String(chapterIndex).padStart(2, '0') + ' · ' + chapterText.textContent.trim() : 'Introduction';
          document.body.dataset.pjChapter = chapterIndex ? String(chapterIndex) : '0';
          progress.setAttribute('aria-valuetext', percentage + '%、' + headingText);
        }

        if (percentage >= 99 && !completed) {
          completed = true;
          status.classList.add('pj-reading-complete');
        } else if (percentage < 96 && completed) {
          completed = false;
          status.classList.remove('pj-reading-complete');
        }
        progressTicking = false;
      }

      function requestReadingUpdate() {
        if (!progressTicking) {
          progressTicking = true;
          window.requestAnimationFrame(updateReadingState);
        }
      }

      function scheduleGeometryRefresh() {
        window.clearTimeout(geometryTimer);
        geometryTimer = window.setTimeout(function () {
          refreshHeadingOffsets();
          requestReadingUpdate();
        }, mobilePerformanceMode ? 220 : 120);
      }

      refreshHeadingOffsets();
      updateReadingState();
      window.addEventListener('scroll', requestReadingUpdate, { passive: true });
      window.addEventListener('resize', scheduleGeometryRefresh, { passive: true });
      window.addEventListener('load', function () {
        refreshHeadingOffsets();
        requestReadingUpdate();
      }, { once: true });
      document.addEventListener('shown.bs.collapse', scheduleGeometryRefresh);
      document.addEventListener('hidden.bs.collapse', scheduleGeometryRefresh);

      // ── Lightweight reference previews ---------------------------------
      // Same-page equations/headings are read from the current DOM. Internal
      // pages are fetched only on first hover/focus and cached. External URLs
      // never trigger a network request; their destination is shown instead.
      var linkPreview = document.createElement('div');
      linkPreview.id = 'pj-link-preview';
      linkPreview.setAttribute('role', 'tooltip');
      linkPreview.hidden = true;
      document.body.appendChild(linkPreview);
      var previewCache = new Map();
      var activePreviewLink = null;
      var previewCloseTimer;

      function previewLinkFromEvent(event) {
        var link = event.target.closest && event.target.closest('a[href]');
        if (!link || !article.contains(link)) return null;
        if (link.matches('.anchorjs-link, .code-copy-button, [data-bs-toggle], [role="button"]')) return null;
        var href = link.getAttribute('href') || '';
        if (!href || href === '#' || /^(javascript|mailto|tel):/i.test(href)) return null;
        return link;
      }

      function previewText(value, limit) {
        var text = String(value || '').replace(/\s+/g, ' ').trim();
        return text.length > limit ? text.slice(0, limit - 1) + '…' : text;
      }

      function renderLinkPreview(data, link) {
        if (activePreviewLink !== link) return;
        linkPreview.replaceChildren();
        var type = document.createElement('span');
        type.className = 'pj-link-preview-type';
        type.textContent = data.type;
        var heading = document.createElement('strong');
        heading.textContent = data.title;
        linkPreview.appendChild(type);
        linkPreview.appendChild(heading);
        if (data.node) {
          var nodeWrap = document.createElement('div');
          nodeWrap.className = 'pj-link-preview-math';
          nodeWrap.appendChild(data.node.cloneNode(true));
          linkPreview.appendChild(nodeWrap);
        } else if (data.description) {
          var description = document.createElement('span');
          description.className = 'pj-link-preview-description';
          description.textContent = data.description;
          linkPreview.appendChild(description);
        }
        linkPreview.hidden = false;
        var describedBy = (link.getAttribute('aria-describedby') || '').split(/\s+/).filter(Boolean);
        if (describedBy.indexOf('pj-link-preview') === -1) {
          link.dataset.pjPreviewDescribedby = describedBy.join(' ');
          describedBy.push('pj-link-preview');
          link.setAttribute('aria-describedby', describedBy.join(' '));
        }
        window.requestAnimationFrame(function () {
          if (activePreviewLink !== link) return;
          var linkRect = link.getBoundingClientRect();
          var previewRect = linkPreview.getBoundingClientRect();
          var left = Math.min(window.innerWidth - previewRect.width - 12, Math.max(12, linkRect.left));
          var below = linkRect.bottom + 10;
          var top = below + previewRect.height <= window.innerHeight - 12
            ? below
            : Math.max(12, linkRect.top - previewRect.height - 10);
          linkPreview.style.left = left + 'px';
          linkPreview.style.top = top + 'px';
        });
      }

      function localTargetPreview(url, link) {
        if (!url.hash || normalizedPath(url) !== normalizedPath(new URL(window.location.href))) return null;
        var id = url.hash.slice(1);
        try { id = decodeURIComponent(id); } catch (_) { /* keep raw id */ }
        var target = document.getElementById(id);
        if (!target) return null;
        var math = target.matches('.math, mjx-container, [id^="eq-"]') ? target : null;
        var targetHeading = target.matches('h1, h2, h3, h4, h5, h6')
          ? target
          : target.querySelector('h1, h2, h3, h4, h5, h6');
        var targetParagraph = target.matches('p, li') ? target : target.querySelector('p, li');
        return {
          type: math ? 'EQUATION' : 'ON THIS PAGE',
          title: previewText((targetHeading || link).textContent, 80) || '参照先',
          description: math ? '' : previewText((targetParagraph || target).textContent, 180),
          node: math
        };
      }

      function internalPagePreview(url) {
        var cacheKey = url.origin + url.pathname + url.search;
        if (!previewCache.has(cacheKey)) {
          previewCache.set(cacheKey, window.fetch(cacheKey, {
            credentials: 'same-origin',
            headers: { 'Accept': 'text/html' }
          }).then(function (response) {
            if (!response.ok) throw new Error('preview unavailable');
            return response.text();
          }).then(function (html) {
            var previewDocument = new DOMParser().parseFromString(html, 'text/html');
            var pageTitle = previewDocument.querySelector('main h1, .quarto-title .title, h1');
            var description = previewDocument.querySelector('meta[name="description"]');
            var firstParagraph = previewDocument.querySelector('main p, article p');
            return {
              type: 'PAGE PREVIEW',
              title: previewText(pageTitle ? pageTitle.textContent : previewDocument.title, 90) || url.pathname,
              description: previewText(description ? description.content : (firstParagraph && firstParagraph.textContent), 190)
            };
          }).catch(function () {
            return { type: 'INTERNAL LINK', title: url.pathname, description: 'リンク先を開いて内容を確認できます。' };
          }));
        }
        return previewCache.get(cacheKey);
      }

      function showLinkPreview(link) {
        window.clearTimeout(previewCloseTimer);
        activePreviewLink = link;
        var url;
        try { url = new URL(link.href, window.location.href); } catch (_) { return; }
        var localPreview = localTargetPreview(url, link);
        if (localPreview) {
          renderLinkPreview(localPreview, link);
          return;
        }
        if (url.origin === window.location.origin) {
          internalPagePreview(url).then(function (data) { renderLinkPreview(data, link); });
          return;
        }
        renderLinkPreview({
          type: 'EXTERNAL LINK',
          title: previewText(link.textContent, 90) || url.hostname,
          description: url.hostname
        }, link);
      }

      function hideLinkPreview(link) {
        window.clearTimeout(previewCloseTimer);
        previewCloseTimer = window.setTimeout(function () {
          if (link) {
            var previousDescription = link.dataset.pjPreviewDescribedby || '';
            if (previousDescription) link.setAttribute('aria-describedby', previousDescription);
            else link.removeAttribute('aria-describedby');
            delete link.dataset.pjPreviewDescribedby;
          }
          activePreviewLink = null;
          linkPreview.hidden = true;
        }, reducedMotion ? 0 : 90);
      }

      article.addEventListener('pointerover', function (event) {
        var link = previewLinkFromEvent(event);
        if (link && (!event.relatedTarget || !link.contains(event.relatedTarget))) showLinkPreview(link);
      });
      article.addEventListener('pointerout', function (event) {
        var link = previewLinkFromEvent(event);
        if (link && (!event.relatedTarget || !link.contains(event.relatedTarget))) hideLinkPreview(link);
      });
      article.addEventListener('focusin', function (event) {
        var link = previewLinkFromEvent(event);
        if (link) showLinkPreview(link);
      });
      article.addEventListener('focusout', function (event) {
        var link = previewLinkFromEvent(event);
        if (link) hideLinkPreview(link);
      });
    }
  });
})();</script>

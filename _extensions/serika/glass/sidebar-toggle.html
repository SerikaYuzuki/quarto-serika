<script>(function () {
  "use strict";

  document.addEventListener("DOMContentLoaded", function () {

    // ── 1. ≡ ボタンをナビバーに挿入 ────────────────────────────────────
    var brandContainer = document.querySelector('.navbar-brand-container');
    if (!brandContainer) return;

    var toggleBtn = document.createElement('a');
    toggleBtn.href = "#";
    toggleBtn.innerHTML = '<i class="bi bi-list"></i>';
    toggleBtn.className = 'navbar-sidebar-toggle pe-2';
    toggleBtn.style.cssText = 'color:inherit;text-decoration:none;font-size:1.5rem;display:flex;align-items:center;';
    toggleBtn.title = "サイドバーを切り替え";
    brandContainer.insertBefore(toggleBtn, brandContainer.firstChild);

    // ── 2. カスタムドロワーを構築 ───────────────────────────────────────
    var siteName = (document.querySelector('.navbar-brand') || {}).textContent;
    siteName = siteName ? siteName.trim() : 'Menu';

    var drawer = document.createElement('div');
    drawer.id = 'pj-drawer';
    drawer.setAttribute('aria-hidden', 'true');
    drawer.setAttribute('role', 'dialog');
    drawer.setAttribute('aria-modal', 'true');
    drawer.innerHTML = [
      '<div id="pj-drawer-backdrop"></div>',
      '<nav id="pj-drawer-panel" aria-label="ナビゲーション">',
        '<div id="pj-drawer-header">',
          '<span id="pj-drawer-site-name">' + siteName + '</span>',
          '<button id="pj-drawer-close" aria-label="閉じる" type="button">',
            '<i class="bi bi-x-lg"></i>',
          '</button>',
        '</div>',
        '<div id="pj-drawer-body"></div>',
      '</nav>'
    ].join('');
    document.body.appendChild(drawer);

    // サイドバーのナビコンテンツをクローンして挿入（ID重複を回避）
    var sidebarNav = document.querySelector('#quarto-sidebar .sidebar-menu-container');
    if (sidebarNav) {
      var clone = sidebarNav.cloneNode(true);

      clone.querySelectorAll('[id]').forEach(function (el) {
        el.id = 'pj-' + el.id;
      });
      clone.querySelectorAll('[data-bs-target]').forEach(function (el) {
        var t = el.getAttribute('data-bs-target');
        if (t && t.charAt(0) === '#') {
          el.setAttribute('data-bs-target', '#pj-' + t.slice(1));
        }
      });
      clone.querySelectorAll('[aria-controls]').forEach(function (el) {
        el.setAttribute('aria-controls', 'pj-' + el.getAttribute('aria-controls'));
      });

      document.getElementById('pj-drawer-body').appendChild(clone);
    }

    // ── 3. 開閉ロジック ─────────────────────────────────────────────────
    var backdrop = document.getElementById('pj-drawer-backdrop');
    var closeBtn = document.getElementById('pj-drawer-close');
    var CLOSE_DURATION = 250;

    function openDrawer() {
      drawer.removeAttribute('aria-hidden');
      drawer.classList.add('pj-open');
      document.body.classList.add('pj-drawer-active');
    }

    function closeDrawer() {
      drawer.classList.add('pj-closing');
      setTimeout(function () {
        drawer.classList.remove('pj-open', 'pj-closing');
        drawer.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('pj-drawer-active');
      }, CLOSE_DURATION);
    }

    backdrop.addEventListener('click', closeDrawer);
    closeBtn.addEventListener('click', closeDrawer);

    // ドロワー内のリンクをクリックしたら閉じる（アコーディオン以外）
    document.getElementById('pj-drawer-body').addEventListener('click', function (e) {
      var link = e.target.closest('a[href]');
      if (link && !link.getAttribute('data-bs-toggle')) {
        closeDrawer();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && drawer.classList.contains('pj-open')) closeDrawer();
    });

    // ── 4. スクロールで navbar を隠す/表示する ──────────────────────
    var navbar = document.querySelector('.navbar');
    if (navbar) {
      var lastScrollY = window.scrollY;
      var ticking = false;
      var SCROLL_HIDE_THRESHOLD = 80;

      function handleNavbarScroll() {
        var current = window.scrollY;
        if (current < SCROLL_HIDE_THRESHOLD) {
          navbar.classList.remove('pj-navbar-hidden');
        } else if (current > lastScrollY) {
          navbar.classList.add('pj-navbar-hidden');
        } else {
          navbar.classList.remove('pj-navbar-hidden');
        }
        lastScrollY = current;
        ticking = false;
      }

      window.addEventListener('scroll', function () {
        if (!ticking) {
          window.requestAnimationFrame(handleNavbarScroll);
          ticking = true;
        }
      }, { passive: true });
    }

    // ── 5. ≡ ボタンのクリック処理 ─────────────────────────────────────
    toggleBtn.addEventListener('click', function (e) {
      e.preventDefault();

      if (window.innerWidth < 992) {
        // モバイル: カスタムドロワーを使用
        drawer.classList.contains('pj-open') ? closeDrawer() : openDrawer();
        return;
      }

      // デスクトップ: 既存のカスタムアニメーション
      var body = document.body;
      if (body.classList.contains('custom-sidebar-hidden')) {
        body.classList.remove('custom-sidebar-hidden');
        body.classList.add('custom-sidebar-showing');
        setTimeout(function () { body.classList.remove('custom-sidebar-showing'); }, 400);
      } else {
        body.classList.remove('custom-sidebar-showing');
        body.classList.add('custom-sidebar-hidden');
      }
    });
  });
})();
</script>

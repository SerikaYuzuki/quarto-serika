<script>(function () {
  "use strict";

  document.addEventListener("DOMContentLoaded", function () {

    // ── 1. 現在地に一致する navbar リンクだけを active にする ────────
    function normalizedPath(url) {
      var path = url.pathname.replace(/\/index\.html$/i, '/');
      path = path.replace(/\.html$/i, '');
      path = path.replace(/\/{2,}/g, '/').replace(/\/+$/, '');
      return path || '/';
    }

    function updateNavbarActiveLink() {
      var current = new URL(window.location.href);
      var currentPath = normalizedPath(current);

      document.querySelectorAll('.navbar .navbar-nav a.nav-link[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || link.hasAttribute('data-bs-toggle')) return;

        var target;
        try {
          target = new URL(href, current);
        } catch (_) {
          return;
        }

        // 外部リンク（mailto: 等を含む）の状態は Quarto/利用側に委ねる。
        if (target.origin !== current.origin) return;

        var isCurrent = normalizedPath(target) === currentPath;
        link.classList.toggle('active', isCurrent);
        if (isCurrent) {
          link.setAttribute('aria-current', 'page');
        } else {
          link.removeAttribute('aria-current');
        }
      });
    }

    updateNavbarActiveLink();

    // bfcache から復帰した場合も URL と active 状態を同期する。
    window.addEventListener('pageshow', updateNavbarActiveLink);

    // ── 2. デスクトップ用 TOC トグル ─────────────────────────────────
    var marginSidebar = document.getElementById('quarto-margin-sidebar');
    var toc = marginSidebar && marginSidebar.querySelector('#TOC, .sidebar-toc');
    var navbarTools = document.querySelector('.quarto-navbar-tools');
    var TOC_STORAGE_KEY = 'serika-glass-toc-visible';
    var TOC_DURATION = 400;

    if (toc && navbarTools) {
      var tocToggleBtn = document.createElement('button');
      tocToggleBtn.type = 'button';
      tocToggleBtn.className = 'pj-toc-toggle quarto-navigation-tool';
      tocToggleBtn.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse" aria-hidden="true"></i>';
      tocToggleBtn.setAttribute('aria-controls', 'quarto-margin-sidebar');
      navbarTools.insertBefore(tocToggleBtn, navbarTools.firstChild);

      var tocVisible = true;
      try {
        tocVisible = window.sessionStorage.getItem(TOC_STORAGE_KEY) !== 'false';
      } catch (_) {
        // Storage を利用できない環境ではページごとの既定表示にフォールバック。
      }

      function updateTocButton(visible) {
        var label = visible ? '目次を非表示' : '目次を表示';
        tocToggleBtn.setAttribute('aria-expanded', String(visible));
        tocToggleBtn.setAttribute('aria-label', label);
        tocToggleBtn.title = label;
      }

      function setTocVisible(visible, animate) {
        window.clearTimeout(tocToggleBtn._pjTocTimer);
        document.body.classList.remove('pj-toc-showing');

        if (visible) {
          if (animate && document.body.classList.contains('pj-toc-hidden')) {
            document.body.classList.add('pj-toc-showing');
          }
          document.body.classList.remove('pj-toc-hidden');
          marginSidebar.setAttribute('aria-hidden', 'false');

          if (animate) {
            tocToggleBtn._pjTocTimer = window.setTimeout(function () {
              document.body.classList.remove('pj-toc-showing');
            }, TOC_DURATION);
          }
        } else {
          document.body.classList.add('pj-toc-hidden');
          marginSidebar.setAttribute('aria-hidden', 'true');
        }

        updateTocButton(visible);
      }

      setTocVisible(tocVisible, false);

      tocToggleBtn.addEventListener('click', function () {
        tocVisible = document.body.classList.contains('pj-toc-hidden');
        var reduceMotion = window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        setTocVisible(tocVisible, !reduceMotion);
        try {
          window.sessionStorage.setItem(TOC_STORAGE_KEY, String(tocVisible));
        } catch (_) {
          // UI は storage の可否に関係なく動作させる。
        }
      });
    }

    // ── 3. ≡ ボタンをナビバーに挿入 ────────────────────────────────────
    var brandContainer = document.querySelector('.navbar-brand-container');
    if (!brandContainer) return;

    var toggleBtn = document.createElement('a');
    toggleBtn.href = "#";
    toggleBtn.innerHTML = '<i class="bi bi-list"></i>';
    toggleBtn.className = 'navbar-sidebar-toggle pe-2';
    toggleBtn.style.cssText = 'color:inherit;text-decoration:none;font-size:1.5rem;display:flex;align-items:center;';
    toggleBtn.title = "サイドバーを切り替え";
    brandContainer.insertBefore(toggleBtn, brandContainer.firstChild);

    // ── 4. カスタムドロワーを構築 ───────────────────────────────────────
    var siteName = (document.querySelector('.navbar-brand') || {}).textContent;
    siteName = siteName ? siteName.trim() : 'Menu';

    var drawer = document.createElement('div');
    drawer.id = 'pj-drawer';
    drawer.setAttribute('aria-hidden', 'true');
    drawer.setAttribute('role', 'dialog');
    drawer.setAttribute('aria-modal', 'true');
    drawer.innerHTML = [
      '<div id="pj-drawer-backdrop"></div>',
      '<nav id="pj-drawer-panel" aria-label="ナビゲーション">',
        '<div id="pj-drawer-header">',
          '<span id="pj-drawer-site-name">' + siteName + '</span>',
          '<button id="pj-drawer-close" aria-label="閉じる" type="button">',
            '<i class="bi bi-x-lg"></i>',
          '</button>',
        '</div>',
        '<div id="pj-drawer-body"></div>',
      '</nav>'
    ].join('');
    document.body.appendChild(drawer);

    // サイドバーのナビコンテンツをクローンして挿入（ID重複を回避）
    var sidebarNav = document.querySelector('#quarto-sidebar .sidebar-menu-container');
    if (sidebarNav) {
      var clone = sidebarNav.cloneNode(true);

      clone.querySelectorAll('[id]').forEach(function (el) {
        el.id = 'pj-' + el.id;
      });
      clone.querySelectorAll('[data-bs-target]').forEach(function (el) {
        var t = el.getAttribute('data-bs-target');
        if (t && t.charAt(0) === '#') {
          el.setAttribute('data-bs-target', '#pj-' + t.slice(1));
        }
      });
      clone.querySelectorAll('[aria-controls]').forEach(function (el) {
        el.setAttribute('aria-controls', 'pj-' + el.getAttribute('aria-controls'));
      });

      document.getElementById('pj-drawer-body').appendChild(clone);
    }

    // ── 5. 開閉ロジック ─────────────────────────────────────────────────
    var backdrop = document.getElementById('pj-drawer-backdrop');
    var closeBtn = document.getElementById('pj-drawer-close');
    var CLOSE_DURATION = 250;

    function openDrawer() {
      drawer.removeAttribute('aria-hidden');
      drawer.classList.add('pj-open');
      document.body.classList.add('pj-drawer-active');
    }

    function closeDrawer() {
      drawer.classList.add('pj-closing');
      setTimeout(function () {
        drawer.classList.remove('pj-open', 'pj-closing');
        drawer.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('pj-drawer-active');
      }, CLOSE_DURATION);
    }

    backdrop.addEventListener('click', closeDrawer);
    closeBtn.addEventListener('click', closeDrawer);

    // ドロワー内のリンクをクリックしたら閉じる（アコーディオン以外）
    document.getElementById('pj-drawer-body').addEventListener('click', function (e) {
      var link = e.target.closest('a[href]');
      if (link && !link.getAttribute('data-bs-toggle')) {
        closeDrawer();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && drawer.classList.contains('pj-open')) closeDrawer();
    });

    // ── 6. スクロールで navbar を隠す/表示する ──────────────────────
    var navbar = document.querySelector('.navbar');
    if (navbar) {
      var lastScrollY = window.scrollY;
      var ticking = false;
      var SCROLL_HIDE_THRESHOLD = 80;

      function handleNavbarScroll() {
        var current = window.scrollY;
        if (current < SCROLL_HIDE_THRESHOLD) {
          navbar.classList.remove('pj-navbar-hidden');
        } else if (current > lastScrollY) {
          navbar.classList.add('pj-navbar-hidden');
        } else {
          navbar.classList.remove('pj-navbar-hidden');
        }
        lastScrollY = current;
        ticking = false;
      }

      window.addEventListener('scroll', function () {
        if (!ticking) {
          window.requestAnimationFrame(handleNavbarScroll);
          ticking = true;
        }
      }, { passive: true });
    }

    // ── 7. ≡ ボタンのクリック処理 ─────────────────────────────────────
    toggleBtn.addEventListener('click', function (e) {
      e.preventDefault();

      if (window.innerWidth < 992) {
        // モバイル: カスタムドロワーを使用
        drawer.classList.contains('pj-open') ? closeDrawer() : openDrawer();
        return;
      }

      // デスクトップ: 既存のカスタムアニメーション
      var body = document.body;
      if (body.classList.contains('custom-sidebar-hidden')) {
        body.classList.remove('custom-sidebar-hidden');
        body.classList.add('custom-sidebar-showing');
        setTimeout(function () { body.classList.remove('custom-sidebar-showing'); }, 400);
      } else {
        body.classList.remove('custom-sidebar-showing');
        body.classList.add('custom-sidebar-hidden');
      }
    });
  });
})();
</script>

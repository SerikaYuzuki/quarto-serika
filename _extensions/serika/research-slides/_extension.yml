title: Research Slides
author: Serika Yuzuki
version: 1.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      theme:
        - simple
        - theme-research-reveal.scss
      menu: false
      controls: true
      controls-tutorial: true
      keyboard: true
      navigation-mode: linear
      slide-number: true
      transition: fade
      background-transition: fade
      center: false
      controls-layout: edges
      progress: true
      hash: true
      history: true
      width: 1280
      height: 720
      margin: 0.06
      include-in-header:
        - mathjax-tex-font.html
